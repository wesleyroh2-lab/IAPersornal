<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meu Plano de Treino | IAPersornal</title>
  <meta name="description" content="Plano de treino personalizado por IA para hipertrofia muscular — IAPersornal." />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── NAVBAR ── -->
  <header class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="nav-logo">🏋️ IAPersornal</a>
      <nav class="nav-links">
        <a href="index.html" class="active">Treino</a>
        <a href="dieta.html">Dieta</a>
      </nav>
    </div>
  </header>

  <!-- ── MAIN ── -->
  <main class="container page-main">

    <!-- Título da página -->
    <div class="page-header">
      <h1 class="page-title">MEU PLANO DE TREINO</h1>
      <p class="page-subtitle">Personal Trainer IA — Foco em Hipertrofia</p>
    </div>

    <!-- Progresso de peso -->
    <div class="weight-progress-card">
      <div class="weight-progress-header">
        <span>⚖️ Progresso de Peso</span>
        <div class="weight-inputs">
          <label>
            Peso atual:
            <input type="number" id="current-weight" value="55" min="40" max="150" step="0.1" />
            kg
          </label>
        </div>
      </div>
      <div class="progress-bar-container">
        <span class="progress-label">55 kg</span>
        <div class="progress-bar">
          <div class="progress-fill" id="weight-fill" style="width:0%"></div>
        </div>
        <span class="progress-label">65 kg</span>
      </div>
      <div class="progress-percent" id="weight-percent">Carregando...</div>
    </div>

    <!-- Contador semanal -->
    <div class="weekly-counter">
      <i class="fa-solid fa-calendar-check"></i>
      <span id="weekly-text">Você treinou 0/6 dias esta semana</span>
      <button class="btn-reset-week" onclick="resetWeek()">🔄 Reiniciar semana</button>
    </div>

    <!-- Seletor de dias -->
    <div class="day-selector">
      <button class="day-btn active" data-day="segunda">SEG</button>
      <button class="day-btn"        data-day="terca">TER</button>
      <button class="day-btn"        data-day="quarta">QUA</button>
      <button class="day-btn"        data-day="quinta">QUI</button>
      <button class="day-btn"        data-day="sexta">SEX</button>
      <button class="day-btn"        data-day="sabado">SÁB</button>
      <button class="day-btn rest"   data-day="domingo">DOM 🧘</button>
    </div>

    <!-- Banner de conclusão -->
    <div class="completion-banner" id="completion-banner">
      💪🔥 Treino Concluído! Você arrasou hoje! Continue assim!
    </div>

    <!-- Painéis de exercícios (renderizados pelo JS) -->
    <div id="panels"></div>

    <!-- Botão de reset -->
    <div class="reset-area">
      <button class="btn-secondary" onclick="resetDay()">🔄 Reiniciar treino do dia</button>
    </div>

  </main>

  <!-- ── FOOTER ── -->
  <footer class="footer">
    <div class="container">
      🏋️ IAPersornal &copy; 2025 — Feito com ❤️ e IA
    </div>
  </footer>

  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
