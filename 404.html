<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página não encontrada | IAPersornal</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;800&display=swap" />
  <style>
    :root {
      --bg: #0a0a0a;
      --orange: #FF6B00;
      --gold: #FFD700;
      --text: #f0f0f0;
      --muted: #666;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .wrap { max-width: 480px; }
    .code {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(6rem, 20vw, 10rem);
      color: var(--orange);
      line-height: 1;
      letter-spacing: 4px;
      text-shadow: 0 0 40px rgba(255,107,0,.35);
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      letter-spacing: 2px;
      margin: .75rem 0 1rem;
    }
    p { color: var(--muted); font-size: 1rem; line-height: 1.6; margin-bottom: 2rem; }
    a.btn {
      display: inline-block;
      background: var(--orange);
      color: #fff;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 1px;
      padding: .75rem 2rem;
      border-radius: 10px;
      text-decoration: none;
      box-shadow: 0 4px 20px rgba(255,107,0,.4);
      transition: transform .2s, box-shadow .2s;
    }
    a.btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(255,107,0,.55); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>Página não encontrada</h1>
    <p>O endereço que você tentou acessar não existe.<br/>Volte para a página inicial e continue seu treino!</p>
    <a href="/IAPersornal/" class="btn">🏋️ Voltar ao início</a>
  </div>
</body>
</html>
